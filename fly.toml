app = "mindset-before-skillset-api"
primary_region = "iad"

[build]

[env]
PORT = "8080"

[[mounts]]
source = "mindset_data"
destination = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/health"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
